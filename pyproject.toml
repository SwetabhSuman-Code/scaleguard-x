# ================================================================
# ScaleGuard X — Root Project Configuration
# Covers: black, ruff, mypy, pytest for all services
# ================================================================

[tool.black]
line-length    = 100
target-version = ["py311"]
skip-magic-trailing-comma = false

# ── Ruff (fast linter replacing flake8 + isort) ──────────────────
[tool.ruff]
line-length    = 100
target-version = "py311"
src            = [
  "api_gateway", "anomaly_engine", "autoscaler",
  "ingestion_service", "metrics_agent", "prediction_engine",
  "worker_cluster", "lib",
]

[tool.ruff.lint]
select  = ["E9", "F63", "F7", "F82"]
ignore  = []

[tool.ruff.lint.isort]
known-first-party = ["lib"]

# ── mypy ──────────────────────────────────────────────────────────
[tool.mypy]
python_version          = "3.11"
strict                  = false
ignore_missing_imports  = true
follow_imports          = "skip"
disallow_untyped_defs   = false
warn_return_any         = false
warn_unused_ignores     = false
exclude                 = ["dashboard/", "terraform/", "k8s/"]

# ── pytest ────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths    = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts      = "-v --tb=short --strict-markers"
markers      = [
  "unit: fast in-process tests (no external deps)",
  "integration: tests that require running containers",
  "benchmark: performance and load tests",
]

# ── coverage ──────────────────────────────────────────────────────
[tool.coverage.run]
source   = [
  "api_gateway", "anomaly_engine", "autoscaler",
  "ingestion_service", "metrics_agent", "prediction_engine",
  "worker_cluster", "lib",
]
omit     = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
