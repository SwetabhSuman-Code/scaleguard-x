version: "3.9"

# ================================================================
# ScaleGuard X — Docker Compose Orchestration
# Run: docker compose up --build
# Prerequisites: copy .env.example → .env and fill in secrets
# ================================================================

x-common-env: &common-env
  POSTGRES_HOST:      postgres_db
  POSTGRES_PORT:      "5432"
  POSTGRES_USER:      ${POSTGRES_USER}
  POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
  POSTGRES_DB:        ${POSTGRES_DB}
  REDIS_HOST:         redis_queue
  REDIS_PORT:         "6379"
  METRICS_STREAM_KEY: ${METRICS_STREAM_KEY:-metrics_stream}
  LOG_LEVEL:          ${LOG_LEVEL:-INFO}
  SENTRY_DSN:         ${SENTRY_DSN:-}

services:

  # ── 1. PostgreSQL ──────────────────────────────────────────────
  postgres_db:
    image: postgres:16-alpine
    container_name: scaleguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Redis ───────────────────────────────────────────────────
  redis_queue:
    image: redis:7-alpine
    container_name: scaleguard-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 3. API Gateway ─────────────────────────────────────────────
  api_gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: scaleguard-api-gateway
    restart: unless-stopped
    environment:
      <<: *common-env
      API_GATEWAY_HOST: api_gateway
      API_GATEWAY_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 4. Metrics Ingestion Service ───────────────────────────────
  ingestion_service:
    build:
      context: .
      dockerfile: ingestion_service/Dockerfile
    container_name: scaleguard-ingestion
    restart: unless-stopped
    environment:
      <<: *common-env
      INGESTION_BATCH_SIZE: "${INGESTION_BATCH_SIZE:-100}"
      INGESTION_INTERVAL:   "${INGESTION_INTERVAL:-2}"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_queue:
        condition: service_healthy

  # ── 5. Worker Cluster (initial 2 replicas) ─────────────────────
  worker_cluster:
    build:
      context: .
      dockerfile: worker_cluster/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      AGENT_INTERVAL:      "${AGENT_INTERVAL:-5}"
      API_GATEWAY_HOST:    api_gateway
      API_GATEWAY_PORT:    "8000"
    labels:
      - "com.docker.compose.service=worker_cluster"
      - "com.docker.compose.project=scaleguard-x"
      - "scaleguard.role=worker"
    deploy:
      replicas: 2
    depends_on:
      redis_queue:
        condition: service_healthy

  # ── 6. Metrics Agent (host node agent) ────────────────────────
  metrics_agent:
    build:
      context: .
      dockerfile: metrics_agent/Dockerfile
    container_name: scaleguard-agent
    restart: unless-stopped
    environment:
      <<: *common-env
      AGENT_INTERVAL: "${AGENT_INTERVAL:-5}"
      NODE_ID:        "${NODE_ID:-host-agent-1}"
    depends_on:
      redis_queue:
        condition: service_healthy

  # ── 7. Anomaly Detection Engine ────────────────────────────────
  anomaly_engine:
    build:
      context: ./anomaly_engine
      dockerfile: Dockerfile
    container_name: scaleguard-anomaly
    restart: unless-stopped
    environment:
      <<: *common-env
      ANOMALY_CPU_THRESHOLD:     "${ANOMALY_CPU_THRESHOLD:-85.0}"
      ANOMALY_LATENCY_THRESHOLD: "${ANOMALY_LATENCY_THRESHOLD:-500.0}"
      ANOMALY_MEMORY_THRESHOLD:  "${ANOMALY_MEMORY_THRESHOLD:-90.0}"
      ANOMALY_RUN_INTERVAL:      "${ANOMALY_RUN_INTERVAL:-10}"
    depends_on:
      postgres_db:
        condition: service_healthy

  # ── 8. Prediction Engine ───────────────────────────────────────
  prediction_engine:
    build:
      context: .
      dockerfile: prediction_engine/Dockerfile
    container_name: scaleguard-prediction
    restart: unless-stopped
    environment:
      <<: *common-env
      PREDICTION_HORIZON_MINUTES: "${PREDICTION_HORIZON_MINUTES:-10}"
      PREDICTION_HISTORY_MINUTES: "${PREDICTION_HISTORY_MINUTES:-60}"
      PREDICTION_RUN_INTERVAL:    "${PREDICTION_RUN_INTERVAL:-30}"
    depends_on:
      postgres_db:
        condition: service_healthy

  # ── 9. Autoscaler ──────────────────────────────────────────────
  autoscaler:
    build:
      context: .
      dockerfile: autoscaler/Dockerfile
    container_name: scaleguard-autoscaler
    restart: unless-stopped
    environment:
      <<: *common-env
      AUTOSCALER_MIN_WORKERS:          "${AUTOSCALER_MIN_WORKERS:-1}"
      AUTOSCALER_MAX_WORKERS:          "${AUTOSCALER_MAX_WORKERS:-8}"
      AUTOSCALER_SCALE_UP_THRESHOLD:   "${AUTOSCALER_SCALE_UP_THRESHOLD:-0.75}"
      AUTOSCALER_SCALE_DOWN_THRESHOLD: "${AUTOSCALER_SCALE_DOWN_THRESHOLD:-0.35}"
      AUTOSCALER_RUN_INTERVAL:         "${AUTOSCALER_RUN_INTERVAL:-15}"
      WORKER_SERVICE_NAME:             "${WORKER_SERVICE_NAME:-scaleguard-x-worker_cluster}"
    volumes:
      # Mount Docker socket so autoscaler can manage worker containers
      # Windows: //./pipe/docker_engine is handled automatically by the code
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_queue:
        condition: service_healthy

  # ── 10. Dashboard Frontend ─────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: scaleguard-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api_gateway:
        condition: service_healthy

  # ── 11. Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: scaleguard-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  # ── 12. Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: scaleguard-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  # ── 13. Jaeger (Distributed Tracing) ──────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: scaleguard-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "6831:6831/udp" # Jaeger agent (thrift compact)
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: scaleguard-x_default
